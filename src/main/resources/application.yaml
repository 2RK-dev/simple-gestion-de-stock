spring:
  application:
    name: simple-gestion-de-stock
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  data:
    rest:
      base-path: /api
      detection-strategy: annotated
server:
  port: ${APP_PORT}
app:
  security:
    cors:
      allowed-origins:
        - http://localhost:4200
    jwt:
      public-key-uri: ${JWT_PUBLIC_KEY_URI:}
      private-key-uri: ${JWT_PRIVATE_KEY_URI:}
      issuer: simple-gestion-de-stock
      access-token-ttl: 24h
